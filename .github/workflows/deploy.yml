name: Deploy School Web

on:
  push:
    branches:
      - main

jobs:
  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t schola-school-web:latest -f Dockerfile .
          docker save -o school-web-prod.tar schola-school-web:latest
          sudo chmod 666 school-web-prod.tar

      - name: Transfer Files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "school-web-prod.tar,docker-compose.yml,deploy.sh"
          target: "/home/edumatrixapi/htdocs/schola-school-web"

      - name: Load and Run on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            chmod +x /home/edumatrixapi/htdocs/schola-school-web/deploy.sh
            /home/edumatrixapi/htdocs/schola-school-web/deploy.sh "/home/edumatrixapi/htdocs/schola-school-web" "school-web" "schola-school-web:latest" "school-web-prod.tar"

  cleanup-production:
    needs: deploy-production
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Prune old images and build cache on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Removing dangling images..."
            docker image prune -f

            echo "Clearing build cache older than 24h..."
            docker builder prune --filter until=24h -f

            echo "Removing any leftover tar files..."
            find /home/edumatrixapi/htdocs/schola-school-web -name "*.tar" -delete
